<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Loading</title>

  <!-- Better font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a192f;
      height: 100vh;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }

    /* LOADER */
    #loader {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #020c1b;
      z-index: 9999;
    }

    svg {
      width: 90px;
      height: 90px;
    }

    /* HEXAGON */
    #hex {
      fill: none;
      stroke: #64ffda;
      stroke-width: 5; /* balanced */

      stroke-linecap: round;
      stroke-linejoin: round;

      stroke-dasharray: 320;
      stroke-dashoffset: 320;

      transform: rotate(180deg);
      transform-origin: 50% 50%;

      animation: drawHex 1.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
    }

    /* TEXT */
    #logoText {
      fill: #64ffda;
      font-size: 38px;
      font-weight: 700;

      text-anchor: middle;
      dominant-baseline: middle;

      opacity: 0;

      /* 🔥 optical centering fix */
      transform: translateY(1.5px);

      animation: fadeText 0.5s ease forwards;
      animation-delay: 1.4s;
    }

    @keyframes drawHex {
      to {
        stroke-dashoffset: 0;
      }
    }

    @keyframes fadeText {
      to {
        opacity: 1;
      }
    }

    /* 🔥 IMPLODE (more natural, not harsh) */
    #loader.hide svg {
      animation: implode 0.7s cubic-bezier(0.6, 0, 0.2, 1) forwards;
    }

    @keyframes implode {
      0% {
        transform: scale(1);
        opacity: 1;
      }
      100% {
        transform: scale(0.35);
        opacity: 0;
      }
    }
  </style>
</head>

<body>

  <div id="loader">
    <svg viewBox="0 0 100 100">
      <polygon
        id="hex"
        points="50,5 90,25 90,75 50,95 10,75 10,25"
      />
      <text id="logoText" x="50" y="50">M</text>
    </svg>
  </div>

  <script>
    window.addEventListener("load", () => {
      setTimeout(() => {
        document.getElementById("loader").classList.add("hide");
      }, 2300);
    });
  </script>

</body>
</html>
